<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <title>points Earth</title>
    <style>
    body { margin: 0; background-color: black; overflow: hidden; }
    #ui {
      position: fixed; inset: 0; pointer-events: none;
      font-family: Helvetica, Arial, sans-serif;
    }
    #search-container {
      position: absolute; top: 48px; left: 50%; transform: translateX(-50%);
      pointer-events: all; width: 520px;
    }
    #search-box {
      display: flex; align-items: center;
      background: rgba(10,10,10,0.78); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px; padding: 0 28px; gap: 16px;
      backdrop-filter: blur(12px);
    }
    #search-icon { color: rgba(255,255,255,0.35); font-size: 26px; line-height: 1; }
    #search-input {
      flex: 1; background: none; border: none; outline: none;
      color: white; font-family: Helvetica, Arial, sans-serif;
      font-size: 22px; font-weight: 300; padding: 24px 0;
    }
    #search-input::placeholder { color: rgba(255,255,255,0.28); }
    #search-suggestion {
      margin-top: 8px; background: rgba(10,10,10,0.88);
      border: 1px solid rgba(255,255,255,0.13); border-radius: 14px;
      overflow: hidden; backdrop-filter: blur(12px);
    }
    #suggestion-item {
      display: flex; align-items: center; gap: 16px;
      padding: 20px 28px; cursor: pointer;
      font-size: 19px; font-weight: 400; color: rgba(255,255,255,0.8);
      transition: background 0.15s;
    }
    #suggestion-item:hover { background: rgba(255,255,255,0.08); }
    #suggestion-arrow { margin-left: auto; color: rgba(255,255,255,0.3); font-size: 20px; }
    #hint {
      position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
      font-size: 12px; font-weight: 300; letter-spacing: 0.1em;
      color: rgba(255,255,255,0.22); white-space: nowrap;
    }
    </style>
